# Gateway API on AWS Load Balancer Controller
# minikube の Envoy GatewayClass から AWS LB Controller に切り替え
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: amazon-alb
spec:
  controllerName: gateway.k8s.aws/alb
---
# ALB の設定（internet-facing、IPv4）
# Gatewayアノテーションは Gateway API コントローラーでは無視されるため
# LoadBalancerConfiguration CRD を使用する
apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: todo-lb-config
  namespace: todo-app
spec:
  scheme: internet-facing
  ipAddressType: ipv4
---
# todo-api の TargetGroup 設定
# target-type: ip を指定（VPC内のPod IPに直接ルーティング）
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: todo-api-tgc
  namespace: todo-app
spec:
  targetReference:
    kind: Service
    name: todo-api
  defaultConfiguration:
    targetType: ip
---
# todo-frontend の TargetGroup 設定
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: todo-frontend-tgc
  namespace: todo-app
spec:
  targetReference:
    kind: Service
    name: todo-frontend
  defaultConfiguration:
    targetType: ip
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: todo-gateway
  namespace: todo-app
spec:
  gatewayClassName: amazon-alb
  # LoadBalancerConfiguration を参照して ALB 設定を適用
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: todo-lb-config
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: todo-routes
  namespace: todo-app
spec:
  parentRefs:
    - name: todo-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: todo-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: todo-frontend
          port: 80
