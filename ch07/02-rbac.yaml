apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todo-app-viewer
  namespace: todo-app
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todo-app-viewer-binding
  namespace: todo-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: todo-app-viewer
subjects:
  - kind: ServiceAccount
    name: monitoring-sa
    namespace: todo-app
