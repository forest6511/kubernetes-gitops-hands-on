apiVersion: v1
kind: Service
metadata:
  name: todo-api
  namespace: todo-app
  labels:
    app: todo-api
spec:
  selector:
    app: todo-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend
  namespace: todo-app
  labels:
    app: todo-frontend
spec:
  selector:
    app: todo-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: todo-db
  namespace: todo-app
  labels:
    app: todo-db
spec:
  selector:
    app: todo-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
